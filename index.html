<!-- 
  ╔══════════════════════════════════════════════════════════════╗
  ║  SUPABASE — SQL NECESSÁRIO (execute no SQL Editor)          ║
  ╚══════════════════════════════════════════════════════════════╝

  -- 1. Colunas extras na tabela wishes
  ALTER TABLE wishes ADD COLUMN IF NOT EXISTS views integer DEFAULT 0;
  ALTER TABLE wishes ADD COLUMN IF NOT EXISTS offers integer DEFAULT 0;
  ALTER TABLE wishes ADD COLUMN IF NOT EXISTS closed boolean DEFAULT false;

  -- 2. Coluna data (JSON) para mensagens ricas (fotos, ofertas)
  ALTER TABLE messages ADD COLUMN IF NOT EXISTS data jsonb;

  -- 3. Row Level Security — permitir leitura pública dos wishes e profiles
  ALTER TABLE wishes    ENABLE ROW LEVEL SECURITY;
  ALTER TABLE profiles  ENABLE ROW LEVEL SECURITY;
  ALTER TABLE conversations ENABLE ROW LEVEL SECURITY;
  ALTER TABLE messages  ENABLE ROW LEVEL SECURITY;

  -- Wishes: qualquer um pode ler; só o dono pode inserir/atualizar/deletar
  CREATE POLICY "wishes_select_all"  ON wishes FOR SELECT USING (true);
  CREATE POLICY "wishes_insert_own"  ON wishes FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "wishes_update_own"  ON wishes FOR UPDATE USING (auth.uid() = user_id);
  CREATE POLICY "wishes_delete_own"  ON wishes FOR DELETE USING (auth.uid() = user_id);

  -- Profiles: qualquer um pode ler; só o dono pode inserir/atualizar
  CREATE POLICY "profiles_select_all" ON profiles FOR SELECT USING (true);
  CREATE POLICY "profiles_insert_own" ON profiles FOR INSERT WITH CHECK (auth.uid() = id);
  CREATE POLICY "profiles_update_own" ON profiles FOR UPDATE USING (auth.uid() = id);

  -- Conversations: participantes podem ler/inserir
  CREATE POLICY "convs_select" ON conversations FOR SELECT USING (auth.uid() = buyer_id OR auth.uid() = seller_id);
  CREATE POLICY "convs_insert" ON conversations FOR INSERT WITH CHECK (auth.uid() = seller_id);

  -- Messages: participantes da conversa podem ler/inserir
  CREATE POLICY "msgs_select" ON messages FOR SELECT USING (
    EXISTS (SELECT 1 FROM conversations c WHERE c.id = conversation_id AND (c.buyer_id = auth.uid() OR c.seller_id = auth.uid()))
  );
  CREATE POLICY "msgs_insert" ON messages FOR INSERT WITH CHECK (auth.uid() = sender_id);

  -- 4. Realtime — habilitar para messages
  ALTER PUBLICATION supabase_realtime ADD TABLE messages;
-->

.prole{font-size:11.5px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);padding:3px 12px;border-radius:14px;display:inline-block;margin-top:7px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.1rem}
.stat{background:#fff;border-radius:var(--r);border:.5px solid var(--bd);padding:1rem;text-align:center}
.snum{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--gd)}
.slbl{font-size:12px;color:var(--txm);margin-top:3px}
.fcard{background:#fff;border-radius:var(--r);border:.5px solid var(--bd);padding:1.4rem}
.fctitle{font-family:'Syne',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:1.1rem}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;align-items:center;justify-content:center;padding:1rem}
.mover.on{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.8rem;width:100%;max-width:460px;border:.5px solid var(--bd);max-height:90vh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.3rem}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem}
.xbtn{background:none;border:none;color:var(--txm);font-size:19px;cursor:pointer;padding:2px}
.aipanel{background:linear-gradient(135deg,#edfaf4,#e3f1fd);border:1px solid #aad9c3;border-radius:9px;padding:1rem;margin-bottom:1rem}
.aihd{display:flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--gd);margin-bottom:.65rem}
.aiuse{display:inline-flex;align-items:center;gap:4px;margin-top:.55rem;background:var(--g);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;transition:.2s}
.aiuse:hover{background:var(--gd)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dk);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s;display:flex;align-items:center;gap:8px;max-width:310px;box-shadow:0 8px 28px rgba(0,0,0,.2)}
.toast.on{transform:translateY(0);opacity:1}
.toast.ok i{color:var(--g)}
.toast.er i{color:var(--c)}
.empty{text-align:center;padding:3.5rem 2rem;color:var(--txl);grid-column:1/-1}
.empty i{font-size:50px;opacity:.16;margin-bottom:.8rem;display:block}
.empty p{font-size:14px;line-height:1.6}
.pricewrap{position:relative}
.pricewrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txm);font-size:14px;pointer-events:none}
.pricewrap input{padding-left:32px}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);gap:12px;color:var(--txm)}
.loading-full i{font-size:36px;color:var(--g)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fi .22s ease forwards}
/* Public feed wrapper */
.pub-wrap{max-width:1200px;margin:0 auto;padding:1.8rem}
</style>
</head>
<body>

<div class="toast" id="toast"><i id="ticon" class="ti ti-check"></i><span id="tmsg"></span></div>
<div class="notif-panel" id="notifPanel">
  <div class="np-hd"><span>Notificações</span><span class="np-all" onclick="markAllRead()">Marcar lidas</span></div>
  <div id="notifList"></div>
</div>

<!-- MSG MODAL -->
<div class="mover" id="msgMod">
  <div class="modal">
    <div class="mhd"><span class="mtitle" id="modTitle">Contatar comprador</span><button class="xbtn" onclick="closeMsgMod()"><i class="ti ti-x"></i></button></div>
    <div class="aipanel"><div class="aihd"><i class="ti ti-sparkles"></i>Sugestão da IA</div><div id="aiTxt" style="font-size:13.5px;color:var(--tx);line-height:1.55"><i class="ti ti-loader spin" style="color:var(--g)"></i> Gerando...</div></div>
    <div class="fld"><label>Sua mensagem</label><textarea id="modMsg" rows="4" placeholder="Ou escreva sua própria mensagem..."></textarea></div>
    <button class="btn g full" onclick="sendModMsg()"><i class="ti ti-send"></i>Enviar mensagem</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="mover" id="detMod">
  <div class="modal">
    <div class="mhd"><span class="mtitle">Detalhes do anúncio</span><button class="xbtn" onclick="document.getElementById('detMod').classList.remove('on')"><i class="ti ti-x"></i></button></div>
    <div id="detContent"></div>
  </div>
</div>

<!-- USER PROFILE MODAL -->
<div class="mover" id="userProfileMod">
  <div class="modal" style="max-width:500px">
    <div class="mhd"><span class="mtitle">Perfil do usuário</span><button class="xbtn" onclick="document.getElementById('userProfileMod').classList.remove('on')"><i class="ti ti-x"></i></button></div>
    <div id="userProfileContent"></div>
  </div>
</div>

<!-- AUTH MODAL (sobre o feed público) -->
<div class="mover" id="authMod">
  <div class="modal" style="max-width:420px">
    <div class="mhd"><span class="mtitle" id="authModTitle">Entrar</span><button class="xbtn" onclick="closeAuthModal()"><i class="ti ti-x"></i></button></div>
    <div id="authLogin">
      <div class="fld"><label>E-mail</label><input type="email" id="le" placeholder="seu@email.com"></div>
      <div class="fld"><label>Senha</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn g full" id="loginBtn" onclick="login()">Entrar na plataforma</button>
      <div class="aswitch" style="margin-top:.8rem">Sem conta? <a onclick="showAuthModal('reg')">Criar gratuitamente</a></div>
    </div>
    <div id="authReg" style="display:none">
      <div class="role-tabs">
        <button class="rtab on" id="tb-buy" onclick="setRole('buyer')"><i class="ti ti-shopping-cart"></i> Comprador</button>
        <button class="rtab" id="tb-sel" onclick="setRole('seller')"><i class="ti ti-tag"></i> Vendedor</button>
      </div>
      <div class="fld"><label>Nome completo</label><input type="text" id="rn" placeholder="Seu nome"></div>
      <div class="fld"><label>E-mail</label><input type="email" id="re" placeholder="seu@email.com"></div>
      <div class="fld"><label>Senha</label><input type="password" id="rp" placeholder="Mínimo 6 caracteres"></div>
      <button class="btn g full" id="regBtn" onclick="register()">Criar conta gratuita</button>
      <div class="aswitch" style="margin-top:.8rem">Já tem conta? <a onclick="showAuthModal('login')">Faça login</a></div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <a class="logo" href="#" onclick="CU?view('feed'):showPublic();return false">quero<em>comprar</em></a>
  <div class="nsearch" id="navSearch">
    <i class="ti ti-search si"></i>
    <input type="text" placeholder="Buscar produtos..." id="searchInp"
      oninput="doSearch(this.value)"
      onfocus="document.getElementById('sdrop').classList.add('on')"
      onblur="setTimeout(()=>document.getElementById('sdrop').classList.remove('on'),200)">
    <div class="sdrop" id="sdrop"></div>
  </div>
  <div id="navR">
    <button class="nbtn" onclick="showAuthModal('login')" style="margin-right:6px">Entrar</button>
    <button class="nbtn p" onclick="showAuthModal('reg')">Criar conta</button>
  </div>
</nav>

<!-- TELA PÚBLICA (feed sem login) -->
<div class="scr on" id="scr-public">
  <div class="pub-wrap">
    <div class="fhead fi">
      <div class="ftitle">Explorar desejos</div>
      <div style="display:flex;gap:7px;align-items:center">
        <select onchange="pubSortMode=this.value;buildPubGrid()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:#fff;outline:none;cursor:pointer">
          <option value="new">Mais recentes</option><option value="price">Maior valor</option><option value="offers">Mais ofertas</option>
        </select>
        <button class="btn g sm" onclick="showAuthModal('login')"><i class="ti ti-plus"></i>Publicar desejo</button>
      </div>
    </div>
    <div class="chips" id="pubChips"></div>
    <div class="grid" id="pubGrid"></div>
  </div>
</div>

<!-- APP (logado) -->
<div class="scr" id="scr-app">
  <div class="lay">
    <div class="side">
      <div class="ssec">Descobrir</div>
      <button class="si-btn on" id="sn-feed" onclick="view('feed')"><i class="ti ti-layout-grid"></i>Explorar</button>
      <button class="si-btn" id="sn-match" onclick="view('match')"><i class="ti ti-sparkles"></i>Match por IA<span class="si-pill green" id="matchpill" style="display:none">✦</span></button>
      <div class="ssec">Minha conta</div>
      <button class="si-btn" id="sn-mine" onclick="view('mine')"><i class="ti ti-heart"></i>Meus desejos</button>
      <button class="si-btn" id="sn-new" onclick="view('new')"><i class="ti ti-plus"></i>Publicar desejo</button>
      <button class="si-btn" id="sn-msgs" onclick="view('msgs')"><i class="ti ti-message-2"></i>Mensagens<span class="si-pill red" id="msdot" style="display:none">0</span></button>
      <div class="ssec">Plataforma</div>
      <button class="si-btn" id="sn-dash" onclick="view('dash')"><i class="ti ti-chart-bar"></i>Analytics</button>
      <button class="si-btn" id="sn-prof" onclick="view('prof')"><i class="ti ti-user"></i>Perfil</button>
      <div style="margin-top:auto;padding-top:1rem;border-top:.5px solid var(--bd)">
        <button class="si-btn" style="color:var(--c)" onclick="logout()"><i class="ti ti-logout"></i>Sair</button>
      </div>
    </div>
    <div class="cnt" id="cnt"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   SUPABASE INIT
════════════════════════════════════════════════ */
const SUPA_URL = 'https://ylkhhylumtewwxivebez.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsa2hoeWx1bXRld3d4aXZlYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNzk5OTcsImV4cCI6MjA5NjY1NTk5N30.gNT7RZaETPMMHDLi3nJRKZ7sWxeBCC2-GM0pRF-g4t8';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ════════════════════════════════════════════════
   GLOBALS
════════════════════════════════════════════════ */
const COLS = ['#1D9E75','#BA7517','#D85A30','#378ADD','#639922','#534AB7','#D4537E'];
const CATS = ['Todos','Eletrônicos','Veículos','Imóveis','Roupas','Móveis','Esportes','Livros','Outros'];
let CU = null;           // { id, email, name, role, city, phone }
let CUProfile = null;    // raw profile row
let selRole = 'buyer';
let activeFilter = 'Todos';
let pubFilter = 'Todos';
let pubSortMode = 'new';
let sortMode = 'new';
let activeConv = null;
let modWishId = null;
let notifOpen = false;
let pendingAction = null;
let WISHES = [];
let CONVS = [];
let PROFILES = {};       // uid -> profile cache
let pendingImgs = [];
let offerOpen = false;
let msgChannel = null;

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  buildPubChips();
  await loadPublicWishes();
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await setSession(session.user);
  }
  // Listen for auth changes (login/logout in other tabs)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await setSession(session.user);
    } else if (event === 'SIGNED_OUT') {
      CU = null; CUProfile = null;
      show('public'); refreshNavPublic();
    }
  });
});

async function setSession(user) {
  // Load profile
  let { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!prof) {
    // Profile not yet created (first login via OAuth etc) — skip
    return;
  }
  CU = { id: user.id, email: user.email, name: prof.name, role: prof.role, city: prof.city || '', phone: prof.phone || '' };
  CUProfile = prof;
  PROFILES[CU.id] = CU;
  enter();
}

/* ════════════════════════════════════════════════
   AUTH MODAL
════════════════════════════════════════════════ */
function showAuthModal(panel) {
  const isLogin = panel === 'login';
  document.getElementById('authModTitle').textContent = isLogin ? 'Entrar' : 'Criar conta';
  document.getElementById('authLogin').style.display = isLogin ? 'block' : 'none';
  document.getElementById('authReg').style.display   = isLogin ? 'none'  : 'block';
  document.getElementById('authMod').classList.add('on');
}
function closeAuthModal() {
  document.getElementById('authMod').classList.remove('on');
  pendingAction = null;
}
function setRole(r) {
  selRole = r;
  document.getElementById('tb-buy').classList.toggle('on', r === 'buyer');
  document.getElementById('tb-sel').classList.toggle('on', r === 'seller');
}
function requireLogin(fn) {
  if (CU) { fn(); return; }
  pendingAction = fn;
  showAuthModal('login');
}

async function login() {
  const email = document.getElementById('le').value.trim();
  const pass  = document.getElementById('lp').value;
  if (!email || !pass) { toast('Preencha e-mail e senha', 'er'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar na plataforma';
  if (error) { toast(error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos' : error.message, 'er'); return; }
  await setSession(data.user);
  closeAuthModal();
  if (pendingAction) { const fn = pendingAction; pendingAction = null; setTimeout(fn, 400); }
}

async function register() {
  const name  = document.getElementById('rn').value.trim();
  const email = document.getElementById('re').value.trim();
  const pass  = document.getElementById('rp').value;
  if (!name || !email || !pass) { toast('Preencha todos os campos', 'er'); return; }
  if (pass.length < 6) { toast('Senha com mínimo 6 caracteres', 'er'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Criando conta...';
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) { btn.disabled = false; btn.textContent = 'Criar conta gratuita'; toast(error.message, 'er'); return; }
  // Create profile
  const { error: pe } = await sb.from('profiles').insert({ id: data.user.id, name, role: selRole, phone: '', city: '' });
  btn.disabled = false; btn.textContent = 'Criar conta gratuita';
  if (pe) { toast('Erro ao criar perfil: ' + pe.message, 'er'); return; }
  await setSession(data.user);
  closeAuthModal();
  toast('Conta criada com sucesso! Bem-vindo(a)!');
}

async function logout() {
  if (msgChannel) { sb.removeChannel(msgChannel); msgChannel = null; }
  await sb.auth.signOut();
  CU = null; CUProfile = null; activeConv = null; CONVS = [];
  show('public'); refreshNavPublic();
}

/* ════════════════════════════════════════════════
   NAV
════════════════════════════════════════════════ */
function refreshNavPublic() {
  document.getElementById('navR').innerHTML = `
    <button class="nbtn" onclick="showAuthModal('login')" style="margin-right:6px">Entrar</button>
    <button class="nbtn p" onclick="showAuthModal('reg')">Criar conta</button>`;
}
function refreshNavLoggedIn() {
  const initials = CU.name ? CU.name[0].toUpperCase() : '?';
  document.getElementById('navR').innerHTML = `
    <div style="display:flex;align-items:center;gap:9px">
      <button class="navico" onclick="toggleNotif()" id="notifBtn"><i class="ti ti-bell"></i></button>
      <div class="upill" onclick="view('prof')">
        <div class="av" style="background:${colorFor(CU.id)}">${initials}</div>
        <span class="uname">${CU.name.split(' ')[0]}</span>
      </div>
    </div>`;
}
function colorFor(uid) {
  if (!uid) return COLS[0];
  // Use last 6 chars of uuid to get index
  const n = parseInt(uid.replace(/-/g,'').slice(-4), 16) || 0;
  return COLS[n % COLS.length];
}

/* ════════════════════════════════════════════════
   SCREENS
════════════════════════════════════════════════ */
function show(s) {
  document.querySelectorAll('.scr').forEach(x => x.classList.remove('on'));
  document.getElementById('scr-' + s).classList.add('on');
}
function showPublic() { show('public'); buildPubGrid(); }

async function enter() {
  document.getElementById('matchpill').style.display = 'inline';
  refreshNavLoggedIn();
  show('app');
  await loadWishes();
  view('feed');
  loadConvs();
  subscribeMessages();
}

/* ════════════════════════════════════════════════
   DATA — WISHES
════════════════════════════════════════════════ */
async function loadPublicWishes() {
  const { data, error } = await sb.from('wishes').select('*').order('created_at', { ascending: false });
  if (error) { console.error('loadPublicWishes:', error); return; }
  if (!data || !data.length) { WISHES = []; buildPubGrid(); return; }
  // Fetch profiles for all unique user_ids
  const uids = [...new Set(data.map(r => r.user_id))];
  const { data: profs } = await sb.from('profiles').select('id,name,role,city').in('id', uids);
  const profMap = {};
  (profs||[]).forEach(p => { profMap[p.id] = p; Object.assign(PROFILES, {[p.id]: p}); });
  WISHES = data.map(r => mapWish(r, profMap));
  buildPubGrid();
}

async function loadWishes() {
  const { data, error } = await sb.from('wishes').select('*').order('created_at', { ascending: false });
  if (error) { console.error('loadWishes:', error); return; }
  if (!data || !data.length) { WISHES = []; return; }
  const uids = [...new Set(data.map(r => r.user_id))];
  const { data: profs } = await sb.from('profiles').select('id,name,role,city').in('id', uids);
  const profMap = {};
  (profs||[]).forEach(p => { profMap[p.id] = p; Object.assign(PROFILES, {[p.id]: p}); });
  WISHES = data.map(r => mapWish(r, profMap));
}

function mapWish(r, profMap) {
  const prof = (profMap && profMap[r.user_id]) || PROFILES[r.user_id] || {};
  return {
    id: r.id,
    uid: r.user_id,
    uname: prof.name || '?',
    urole: prof.role || 'buyer',
    ucity: prof.city || '',
    title: r.title,
    cat: r.category,
    cond: r.condition,
    price: Number(r.price),
    desc: r.description || '',
    ts: new Date(r.created_at).getTime(),
    views: r.views || 0,
    offers: r.offers || 0,
    closed: r.closed || false
  };
}

/* ════════════════════════════════════════════════
   PUBLIC FEED
════════════════════════════════════════════════ */
function buildPubChips() {
  const el = document.getElementById('pubChips'); if (!el) return;
  el.innerHTML = CATS.map(c =>
    `<div class="chip${c===pubFilter?' on':''}" onclick="pubFilterCat('${c}')">${c}</div>`
  ).join('');
}
function pubFilterCat(c) {
  pubFilter = c; buildPubGrid();
  document.querySelectorAll('#pubChips .chip').forEach(x => x.classList.toggle('on', x.textContent === c));
}
function buildPubGrid() {
  const g = document.getElementById('pubGrid'); if (!g) return;
  let ws = pubFilter === 'Todos' ? [...WISHES] : WISHES.filter(w => w.cat === pubFilter);
  ws = ws.filter(w => !w.closed);
  if (pubSortMode === 'new')   ws.sort((a,b) => b.ts - a.ts);
  else if (pubSortMode === 'price') ws.sort((a,b) => b.price - a.price);
  else ws.sort((a,b) => (b.offers||0) - (a.offers||0));
  g.innerHTML = ws.length ? ws.map(pubCardHTML).join('') :
    '<div class="empty" style="grid-column:1/-1"><i class="ti ti-mood-empty"></i><p>Nenhum desejo publicado ainda.</p></div>';
}
function pubCardHTML(w) {
  return `<div class="wcard fi">
    <div class="wch">
      <div class="wcu">
        <div class="av" style="background:${colorFor(w.uid)};width:30px;height:30px;border-radius:50%;font-size:11px;flex-shrink:0;cursor:pointer" onclick="showUserProfile('${w.uid}')">${w.uname[0]}</div>
        <div><div class="wun" style="cursor:pointer" onclick="showUserProfile('${w.uid}')">${w.uname}</div><div class="wt">${relTime(w.ts)}</div></div>
      </div>
      <span class="cat">${w.cat}</span>
    </div>
    <div class="wtitle" onclick="showDetail(${w.id})">${w.title}</div>
    <div class="wdesc">${w.desc}</div>
    <div class="wcf">
      <div><div class="price">até R$ ${fmt(w.price)}</div><div class="psub">${w.cond}</div></div>
      <button class="msgbtn" onclick="requireLogin(()=>openMsgMod(${w.id}))"><i class="ti ti-send" style="font-size:13px"></i>Tenho isso!</button>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════════ */
function doSearch(q) {
  const drop = document.getElementById('sdrop');
  if (!q.trim()) { drop.innerHTML = ''; return; }
  const res = WISHES.filter(w =>
    w.title.toLowerCase().includes(q.toLowerCase()) ||
    w.cat.toLowerCase().includes(q.toLowerCase()) ||
    w.desc.toLowerCase().includes(q.toLowerCase())
  ).slice(0, 6);
  if (!res.length) { drop.innerHTML = '<div style="padding:.9rem;font-size:13px;color:var(--txl);text-align:center">Nenhum resultado</div>'; return; }
  drop.innerHTML = res.map(w =>
    `<div class="sitem" onmousedown="showDetail(${w.id})">
      <div class="av" style="background:${colorFor(w.uid)};border-radius:7px;width:34px;height:34px;font-size:12px;flex-shrink:0">${w.uname[0]}</div>
      <div><div style="font-size:13.5px;font-weight:500">${w.title}</div>
      <div style="font-size:12px;color:var(--txm)">${w.cat} · até R$ ${fmt(w.price)}</div></div>
    </div>`
  ).join('');
}

/* ════════════════════════════════════════════════

let NOTIFS = [];
function toggleNotif() {
  notifOpen = !notifOpen;

}
function buildNotifPanel() {
  const el = document.getElementById('notifList'); if (!el) return;
  const myN = NOTIFS.filter(n => n.uid === CU.id).sort((a,b) => b.ts - a.ts);
  if (!myN.length) { el.innerHTML = '<div style="padding:1.5rem;text-align:center;font-size:13px;color:var(--txl)">Nenhuma notificação</div>'; return; }
  const icons = { msg:'ti-message-2', offer:'ti-tag', match:'ti-sparkles' };
  const bgs   = { msg:'var(--bl)', offer:'var(--al)', match:'var(--gl)' };
  const fgs   = { msg:'var(--b)', offer:'var(--a)', match:'var(--g)' };
  el.innerHTML = myN.map(n =>
    `<div class="ni${n.read?'':' unread'}" onclick="clickNotif('${n.id}')">
      <div class="niico" style="background:${bgs[n.type]||'#eee'};color:${fgs[n.type]||'#666'}"><i class="ti ${icons[n.type]||'ti-bell'}"></i></div>

function clickNotif(id) {
  const n = NOTIFS.find(x => x.id === id); if (!n) return;
  n.read = true; notifOpen = false;
  document.getElementById('notifPanel').classList.remove('on');
  refreshNavLoggedIn();
  if (n.convId) { activeConv = CONVS.find(c => c.id === n.convId); view('msgs'); }
}
function markAllRead() { NOTIFS.filter(n => n.uid === CU.id).forEach(n => n.read = true); buildNotifPanel(); }
function pushNotif(type, text, convId) {
  NOTIFS.push({ id: Date.now().toString(), uid: CU.id, type, text, ts: Date.now(), read: false, convId });

}

function view(vn) {
  ['feed','match','mine','new','msgs','dash','prof'].forEach(x => {
    const s = document.getElementById('sn-' + x); if (s) s.classList.remove('on');
  });
  const s = document.getElementById('sn-' + vn); if (s) s.classList.add('on');
  const el = document.getElementById('cnt');
  el.style.padding = '1.8rem'; el.style.margin = '';
  el.classList.remove('msgs-view');
  notifOpen = false; document.getElementById('notifPanel').classList.remove('on');
  if (vn === 'feed')       renderFeed(el);
  else if (vn === 'match') renderMatch(el);
  else if (vn === 'mine')  renderMine(el);
  else if (vn === 'new')   renderNew(el);
  else if (vn === 'msgs')  { el.classList.add('msgs-view'); el.style.padding='0'; renderMsgs(el); }
  else if (vn === 'dash')  renderDash(el);
  else if (vn === 'prof')  renderProf(el);
}

/* ════════════════════════════════════════════════
   CONVERSATIONS (Supabase)
════════════════════════════════════════════════ */
async function loadConvs() {
  const { data, error } = await sb.from('conversations')
    .select('*, wishes(title,price)')
    .or(`buyer_id.eq.${CU.id},seller_id.eq.${CU.id}`)
    .order('created_at', { ascending: false });
  if (error) { console.error('loadConvs:', error); return; }
  const convs = data || [];
  // Enrich with profile names
  const uids = [...new Set(convs.flatMap(c => [c.buyer_id, c.seller_id]))];
  if (uids.length) {
    const { data: profs } = await sb.from('profiles').select('id,name').in('id', uids);
    const pm = {}; (profs||[]).forEach(p => pm[p.id] = p);
    convs.forEach(c => {
      c.buyer  = pm[c.buyer_id]  || { name: '?' };
      c.seller = pm[c.seller_id] || { name: '?' };
    });
  }
  CONVS = convs;
}

function subscribeMessages() {
  if (msgChannel) sb.removeChannel(msgChannel);
  msgChannel = sb.channel('messages-' + CU.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, async payload => {
      const msg = payload.new;
      // Find the conversation
      const conv = CONVS.find(c => c.id === msg.conversation_id);
      if (!conv) { await loadConvs(); return; }
      // Append message to active conversation if open
      if (activeConv && activeConv.id === msg.conversation_id && msg.sender_id !== CU.id) {
        const senderName = conv.buyer_id === msg.sender_id ? conv.buyer?.name : conv.seller?.name;
        appendBubble(msg, false);
        scrollChat();
      }
      // Push notification for incoming messages
      if (msg.sender_id !== CU.id) {
        const senderConv = CONVS.find(c=>c.id===msg.conversation_id);
        const wTitle = senderConv?.wishes?.title || 'produto';
        pushNotif('msg', `Nova mensagem sobre "${wTitle.substring(0,30)}"`, msg.conversation_id);
      }
      buildConvList();
    })
    .subscribe();
}

  const inp = document.getElementById('chin');
  const text = inp ? inp.value.trim() : '';
  const offerEl = document.getElementById('offerVal');
  const price = offerEl ? parseFloat(offerEl.value) : null;
  const hasOffer = offerOpen && price && price > 0;
  const hasImgs = pendingImgs.length > 0;
  if (!text && !hasOffer && !hasImgs) return;

  async function insertMsg(payload) {
    const { data: msg, error } = await sb.from('messages').insert(payload).select().single();
    if (error) { toast('Erro ao enviar: ' + error.message, 'er'); return null; }
    return msg;
  }

  // Images
  for (const src of pendingImgs) {
    const msg = await insertMsg({ conversation_id: activeConv.id, sender_id: CU.id, text: '_img_', data: { type:'img', src } });
    if (msg) appendBubble(msg);
  }
  pendingImgs = []; renderImgStrip();

  // Offer
  if (hasOffer) {
    const msg = await insertMsg({ conversation_id: activeConv.id, sender_id: CU.id, text: text || '_offer_', data: { type:'offer', price } });
    if (msg) appendBubble(msg);
    offerEl.value = ''; offerOpen = false;
    const ob = document.getElementById('offerBar'); if (ob) ob.style.display = 'none';
  } else if (text) {
    const msg = await insertMsg({ conversation_id: activeConv.id, sender_id: CU.id, text });
    if (msg) appendBubble(msg);
  }
  if (inp) inp.value = '';
  scrollChat();
  buildConvList();
}

function toggleOffer() {
  offerOpen = !offerOpen;
  const bar = document.getElementById('offerBar');
  if (bar) bar.style.display = offerOpen ? 'flex' : 'none';
  if (offerOpen) setTimeout(() => { const v=document.getElementById('offerVal'); if(v) v.focus(); }, 50);
}
function handleFiles(files) {
  Array.from(files).forEach(f => {
    const r = new FileReader();
    r.onload = e => { pendingImgs.push(e.target.result); renderImgStrip(); };
    r.readAsDataURL(f);
  });
  document.getElementById('fileInp').value = '';
}
function renderImgStrip() {
  const strip = document.getElementById('imgStrip'); if (!strip) return;
  if (!pendingImgs.length) { strip.style.display='none'; strip.innerHTML=''; return; }
  strip.style.display = 'flex';
  strip.innerHTML = pendingImgs.map((src,i) =>
    `<div class="img-thumb"><img src="${src}"><button class="rm" onclick="removeImg(${i})"><i class="ti ti-x" style="font-size:9px"></i></button></div>`
  ).join('');
}
function removeImg(i) { pendingImgs.splice(i,1); renderImgStrip(); }
function openImg(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:90vh;border-radius:10px">`;
  ov.onclick = () => document.body.removeChild(ov);
  document.body.appendChild(ov);
}

async function openMsgMod(wid) {
  if (!CU) { requireLogin(() => openMsgMod(wid)); return; }

  if (w.uid === CU.id) { toast('Este é seu próprio anúncio','er'); return; }

  document.getElementById('aiTxt').innerHTML = '<i class="ti ti-loader spin" style="color:var(--g)"></i> Gerando sugestão...';
  document.getElementById('msgMod').classList.add('on');
  // AI suggestion
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800,
        system:`Gere mensagem inicial curta (2-3 frases) persuasiva de vendedor para comprador em pt-BR informal. Retorne APENAS a mensagem.`,
        messages:[{role:'user',content:`Comprador procura: "${w.title}". Categoria: ${w.cat}. Orçamento: R$ ${fmt(w.price)}. Condição: ${w.cond}. Desc: ${w.desc}`}]
      })
    });
    const data = await resp.json();
    const txt = data.content&&data.content[0]&&data.content[0].text;
    if (txt) {
      document.getElementById('aiTxt').innerHTML = `${esc(txt)}<br>
        <button class="aiuse" onclick="document.getElementById('modMsg').value=${JSON.stringify(txt)}">
          <i class="ti ti-check" style="font-size:12px"></i>Usar esta mensagem</button>`;
    }
  } catch(e) {
    document.getElementById('aiTxt').innerHTML = 'Apresente-se e descreva o produto que tem a oferecer.';
  }
}
function closeMsgMod() { document.getElementById('msgMod').classList.remove('on'); modWishId = null; }
async function sendModMsg() {
  const text = document.getElementById('modMsg').value.trim();
  if (!text) { toast('Digite uma mensagem','er'); return; }
  const w = WISHES.find(x => x.id === modWishId); if (!w) return;
  let { data: existing } = await sb.from('conversations')
    .select('*, wishes(title,price)')
    .eq('wish_id', modWishId).eq('seller_id', CU.id).maybeSingle();
  if (!existing) {
    const { data: newConv, error } = await sb.from('conversations').insert({
      wish_id: modWishId, buyer_id: w.uid, seller_id: CU.id
    }).select('*, wishes(title,price)').single();
    if (error) { toast('Erro: ' + error.message, 'er'); return; }
    // Enrich with profiles
    newConv.buyer  = PROFILES[newConv.buyer_id]  || { name: w.uname || '?' };
    newConv.seller = PROFILES[newConv.seller_id] || { name: CU.name };
    CONVS.unshift(newConv); existing = newConv;
  } else {
    existing.buyer  = existing.buyer  || PROFILES[existing.buyer_id]  || { name: '?' };
    existing.seller = existing.seller || PROFILES[existing.seller_id] || { name: CU.name };
  }
  const { error } = await sb.from('messages').insert({ conversation_id: existing.id, sender_id: CU.id, text });
  if (error) { toast('Erro: ' + error.message, 'er'); return; }
  await sb.from('wishes').update({ offers: (w.offers||0)+1 }).eq('id', modWishId);
  w.offers = (w.offers||0)+1;
  closeMsgMod(); toast('Mensagem enviada!');
  activeConv = existing; view('msgs');
}

async function fetchInsights(topC, tv, to) {
  try {

      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800,

      })
    });
    const data = await resp.json();
    let txt = (data.content&&data.content[0]&&data.content[0].text)||'';

      `<div class="insight-item"><i class="ti ${ins.icon}" style="color:var(--g);flex-shrink:0;margin-top:2px"></i><span>${ins.text}</span></div>`

      <div class="insight-item"><i class="ti ti-trending-up" style="color:var(--g);flex-shrink:0"></i><span>Eletrônicos lidera com mais desejos e maiores orçamentos — alta oportunidade.</span></div>

}

    <div class="fld"><label>Papel na plataforma</label>
      <select id="erole">
        <option value="buyer" ${CU.role==='buyer'?'selected':''}>Comprador</option>
        <option value="seller" ${CU.role==='seller'?'selected':''}>Vendedor</option>
        <option value="both" ${CU.role==='both'?'selected':''}>Ambos</option>
      </select>
    </div>
    <button class="btn g" onclick="saveProf()"><i class="ti ti-check"></i>Salvar alterações</button>
  </div>`;
}
async function saveProf() {
  const name = val('en'), phone = val('ep'), city = val('ec'), role = document.getElementById('erole').value;
  const { error } = await sb.from('profiles').update({ name, phone, city, role }).eq('id', CU.id);
  if (error) { toast('Erro: ' + error.message, 'er'); return; }
  CU.name = name; CU.phone = phone; CU.city = city; CU.role = role;
  toast('Perfil atualizado!'); renderProf(document.getElementById('cnt')); refreshNavLoggedIn();
}

/* ════════════════ UTILS ════════════════ */
function val(id) { const e=document.getElementById(id); return e?e.value.trim():''; }
function fmt(n) { return Number(n).toLocaleString('pt-BR'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtT(ts) {
  const d = new Date(ts);
  return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
}
function relTime(ts) {
  const d = Date.now() - (typeof ts==='number'?ts:new Date(ts).getTime());
  if (d<60000)   return 'agora';
  if (d<3600000) return Math.floor(d/60000)+'min atrás';
  if (d<86400000)return Math.floor(d/3600000)+'h atrás';
  return Math.floor(d/86400000)+'d atrás';
}
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  document.getElementById('tmsg').textContent = msg;
  document.getElementById('ticon').className = 'ti '+(type==='ok'?'ti-check':'ti-alert-circle');
  t.className = 'toast on '+type;
  setTimeout(()=>t.classList.remove('on'), 3000);
}
document.addEventListener('click', e => {
  if (notifOpen && !e.target.closest('#notifPanel') && !e.target.closest('#notifBtn')) {
    notifOpen = false; document.getElementById('notifPanel').classList.remove('on');
  }
});
</script>
